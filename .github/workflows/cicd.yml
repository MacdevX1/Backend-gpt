name: Node.js CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Restore .env
        run: |
          if [ -f /home/ubuntu/backend.env ]; then
            cp /home/ubuntu/backend.env .env
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install Dependencies
        run: npm ci --omit=dev

      - name: Build Project
        run: npm run build --if-present

      - name: Restart Backend
        run: |
          if pm2 describe backend > /dev/null; then
            pm2 restart backend --update-env
          else
            pm2 start server.js --name backend
          fi
          pm2 save

      - name: Verify Backend
        run: |
          sleep 5
          pm2 status
          curl http://localhost:3000/test
