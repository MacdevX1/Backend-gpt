name: Node.js CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      # Backup existing .env
      - name: Backup .env
        run: |
          if [ -f .env ]; then
            mv .env /tmp/env_backup
          fi

      # Pull latest code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Restore .env
      - name: Restore .env
        run: |
          if [ -f /tmp/env_backup ]; then
            mv /tmp/env_backup .env
          fi

      # Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      # Install dependencies
      - name: Install Dependencies
        run: npm ci --omit=dev

      # Build (if your project has a build step)
      - name: Build Project
        run: npm run build --if-present

      # Restart PM2
      - name: Restart Backend
        run: |
          if pm2 describe backend > /dev/null; then
            pm2 restart backend
          else
            pm2 start server.js --name backend
          fi
          pm2 save
